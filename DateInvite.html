<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Special Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --gold:#d4af6a;
  --gold-light:#f5e0a0;
  --gold-deep:#a8832a;
  --bg:#080508;
  --bg2:#100c14;
  --cream:#fdf4e8;
  --text:#f0e4cc;
}

body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ── Bubble canvas ── */
#bubbleCanvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ── Pages ── */
.page{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  padding:20px;
  transition:opacity 0.8s ease, transform 0.8s ease;
}
.page.hidden{opacity:0;pointer-events:none;transform:scale(0.96)}

/* ── Card ── */
.card{
  background:linear-gradient(145deg,rgba(20,12,28,0.97),rgba(12,8,18,0.98));
  border:1px solid rgba(212,175,106,0.35);
  border-radius:6px;
  padding:44px 36px 40px;
  max-width:400px;width:100%;
  text-align:center;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(212,175,106,0.08),
    0 30px 80px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(212,175,106,0.2);
}

/* corner ornaments */
.card::before,.card::after{
  content:'✦';
  position:absolute;
  font-size:0.65rem;
  color:var(--gold);
  opacity:0.5;
}
.card::before{top:14px;left:18px}
.card::after{bottom:14px;right:18px}

.card-corner-tr,.card-corner-bl{
  position:absolute;font-size:0.65rem;
  color:var(--gold);opacity:0.5;
}
.card-corner-tr{top:14px;right:18px}
.card-corner-bl{bottom:14px;left:18px}

/* ── Eyebrow ── */
.eyebrow{
  font-family:'Tenor Sans',sans-serif;
  font-size:0.6rem;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--gold);opacity:0.8;
  margin-bottom:22px;
}

/* ── Seal ── */
.seal{
  width:64px;height:64px;
  border:1px solid rgba(212,175,106,0.4);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  font-size:1.8rem;
  background:radial-gradient(circle,rgba(212,175,106,0.12),transparent);
  animation:sealGlow 3s ease-in-out infinite;
}
@keyframes sealGlow{
  0%,100%{box-shadow:0 0 0 rgba(212,175,106,0)}
  50%{box-shadow:0 0 20px rgba(212,175,106,0.25)}
}

/* ── Display text ── */
.display{
  font-size:2.4rem;font-weight:300;line-height:1.15;
  color:var(--cream);
  margin-bottom:10px;
}
.display em{
  font-style:italic;
  background:linear-gradient(120deg,var(--gold-light),var(--gold),var(--gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

.name-display{
  font-size:2.8rem;font-weight:300;font-style:italic;
  background:linear-gradient(120deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin:4px 0 16px;
  min-height:3.2rem;
}

.subtitle{
  font-size:0.95rem;font-weight:300;font-style:italic;
  color:rgba(240,228,204,0.6);
  margin-bottom:32px;line-height:1.6;
}

/* ── Divider ── */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0 24px;
  opacity:0.35;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gold)}
.divider span{font-size:0.6rem;color:var(--gold);letter-spacing:0.2em}

/* ── Date details ── */
.details{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:32px;
}
.detail-row{
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.detail-icon{font-size:0.9rem;opacity:0.7}
.detail-text{
  font-family:'Tenor Sans',sans-serif;
  font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(240,228,204,0.75);
}
.detail-text strong{
  color:var(--gold-light);font-family:'Cormorant Garamond',serif;
  font-size:0.95rem;letter-spacing:0.05em;text-transform:none;font-weight:400;
}

/* ── Input ── */
.name-input{
  width:100%;
  background:rgba(212,175,106,0.06);
  border:1px solid rgba(212,175,106,0.3);
  border-radius:3px;
  padding:14px 18px;
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;font-style:italic;
  color:var(--cream);
  text-align:center;
  outline:none;
  margin-bottom:24px;
  transition:border-color 0.3s;
}
.name-input::placeholder{color:rgba(212,175,106,0.35)}
.name-input:focus{border-color:rgba(212,175,106,0.7)}

/* ── Buttons ── */
.btn-primary{
  width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  border:none;
  padding:16px 32px;
  border-radius:3px;
  font-family:'Tenor Sans',sans-serif;
  font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;
  color:#0d080f;
  cursor:pointer;
  transition:all 0.25s;
  margin-bottom:10px;
}
.btn-primary:active{transform:scale(0.98);opacity:0.9}

.btn-row{display:flex;gap:12px;margin-top:4px}

.btn-yes{
  flex:1;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  border:none;padding:16px;border-radius:3px;
  font-family:'Tenor Sans',sans-serif;
  font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;
  color:#0d080f;cursor:pointer;transition:all 0.25s;
}
.btn-no{
  flex:1;
  background:none;
  border:1px solid rgba(212,175,106,0.35);
  padding:16px;border-radius:3px;
  font-family:'Tenor Sans',sans-serif;
  font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(212,175,106,0.6);cursor:pointer;transition:all 0.25s;
}
.btn-yes:active{transform:scale(0.97)}
.btn-no:active{transform:scale(0.97)}

/* ── Response page ── */
.response-icon{font-size:3.5rem;margin-bottom:20px;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

.response-title{
  font-size:2rem;font-weight:300;
  color:var(--cream);margin-bottom:12px;
}
.response-title em{
  font-style:italic;
  background:linear-gradient(120deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.response-msg{
  font-size:1rem;font-weight:300;font-style:italic;
  color:rgba(240,228,204,0.65);line-height:1.7;
}

/* ── Sending state ── */
.sending{
  font-family:'Tenor Sans',sans-serif;
  font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(212,175,106,0.5);
  margin-top:16px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="bubbleCanvas"></canvas>

<!-- PAGE 1: Name Entry -->
<div class="page" id="page1">
  <div class="card">
    <div class="card-corner-tr">✦</div>
    <div class="card-corner-bl">✦</div>
    <div class="eyebrow">A personal invitation</div>
    <div class="seal">💌</div>
    <div class="display">This invite is<br>made for <em>you</em></div>
    <div class="subtitle">Enter your name to<br>reveal your surprise</div>
    <input class="name-input" id="nameInput" type="text" placeholder="Your name…" autocomplete="off">
    <button class="btn-primary" onclick="revealInvite()">Open My Invitation ✦</button>
  </div>
</div>

<!-- PAGE 2: The Invite -->
<div class="page hidden" id="page2">
  <div class="card">
    <div class="card-corner-tr">✦</div>
    <div class="card-corner-bl">✦</div>
    <div class="eyebrow">You are cordially invited</div>
    <div class="seal">🥂</div>
    <div class="display">Dear,</div>
    <div class="name-display" id="nameDisplay"></div>

    <div class="divider"><span>✦</span></div>

    <div class="details">
      <div class="detail-row">
        <span class="detail-icon">📅</span>
        <span class="detail-text">Date &nbsp;·&nbsp; <strong>Monday, 27th July 2026</strong></span>
      </div>
      <div class="detail-row">
        <span class="detail-icon">🕛</span>
        <span class="detail-text">Time &nbsp;·&nbsp; <strong>12:00 Noon</strong></span>
      </div>
      <div class="detail-row">
        <span class="detail-icon">📍</span>
        <span class="detail-text">Venue &nbsp;·&nbsp; <strong>Tim Hortons</strong></span>
      </div>
      <div class="detail-row">
        <span class="detail-icon"></span>
        <span class="detail-text" style="font-size:0.65rem;opacity:0.7">105 Market St, Manchester M1 1NN</span>
      </div>
    </div>

    <div class="divider"><span>✦</span></div>

    <div class="subtitle" style="margin-bottom:20px">Will you join me?</div>

    <div class="btn-row">
      <button class="btn-yes" onclick="respond('yes')">✓ &nbsp; Yes, I will</button>
      <button class="btn-no" onclick="respond('no')">✗ &nbsp; Can't make it</button>
    </div>
    <div class="sending hidden" id="sendingMsg">Sending your response…</div>
  </div>
</div>

<!-- PAGE 3: Response confirmation -->
<div class="page hidden" id="page3">
  <div class="card">
    <div class="card-corner-tr">✦</div>
    <div class="card-corner-bl">✦</div>
    <div class="response-icon" id="responseIcon"></div>
    <div class="response-title" id="responseTitle"></div>
    <div class="divider"><span>✦</span></div>
    <div class="response-msg" id="responseMsg"></div>
  </div>
</div>

<script>
// ── Sparkling Bubbles ──
const canvas = document.getElementById('bubbleCanvas');
const ctx = canvas.getContext('2d');
let W, H, bubbles = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function randomBubble(){
  const r = 2 + Math.random() * 12;
  return {
    x: Math.random() * W,
    y: H + r + Math.random() * H,
    r,
    speed: 0.3 + Math.random() * 0.9,
    drift: (Math.random() - 0.5) * 0.4,
    opacity: 0.1 + Math.random() * 0.5,
    shimmer: Math.random() * Math.PI * 2,
    shimmerSpeed: 0.02 + Math.random() * 0.04,
    hue: 38 + Math.random() * 20, // gold range
    sparkle: Math.random() > 0.6,
    sparkleAngle: Math.random() * Math.PI * 2,
  };
}

function initBubbles(){
  bubbles = [];
  const count = Math.min(Math.floor(W * H / 8000), 90);
  for(let i = 0; i < count; i++){
    const b = randomBubble();
    b.y = Math.random() * H; // start scattered
    bubbles.push(b);
  }
}

function drawBubble(b){
  ctx.save();
  const alpha = b.opacity * (0.6 + 0.4 * Math.sin(b.shimmer));

  // Main bubble
  const grad = ctx.createRadialGradient(
    b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.05,
    b.x, b.y, b.r
  );
  grad.addColorStop(0, `hsla(${b.hue},80%,90%,${alpha * 0.9})`);
  grad.addColorStop(0.4, `hsla(${b.hue},70%,65%,${alpha * 0.5})`);
  grad.addColorStop(1, `hsla(${b.hue},60%,40%,${alpha * 0.1})`);

  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Rim
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(${b.hue},90%,80%,${alpha * 0.7})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Highlight dot
  ctx.beginPath();
  ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.85})`;
  ctx.fill();

  // Sparkle cross
  if(b.sparkle && b.r > 5){
    const sl = b.r * 1.8;
    const sa = b.sparkleAngle;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(sa);
    ctx.strokeStyle = `hsla(${b.hue},100%,88%,${alpha * 0.8})`;
    ctx.lineWidth = 0.7;
    for(let i = 0; i < 4; i++){
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(sl * (i < 2 ? 1 : 0) * (i === 0 ? 1 : -1), sl * (i >= 2 ? 1 : 0) * (i === 2 ? 1 : -1));
      ctx.stroke();
    }
    // simpler: just 2 lines
    ctx.beginPath();ctx.moveTo(-sl,0);ctx.lineTo(sl,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-sl);ctx.lineTo(0,sl);ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function animateBubbles(){
  ctx.clearRect(0, 0, W, H);
  bubbles.forEach(b => {
    b.y -= b.speed;
    b.x += b.drift;
    b.shimmer += b.shimmerSpeed;
    b.sparkleAngle += 0.01;
    if(b.y < -b.r * 2){
      Object.assign(b, randomBubble());
    }
    drawBubble(b);
  });
  requestAnimationFrame(animateBubbles);
}

window.addEventListener('resize', ()=>{ resize(); initBubbles(); });
resize(); initBubbles(); animateBubbles();

// ── Page transitions ──
function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── Name reveal ──
function revealInvite(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ 
    document.getElementById('nameInput').style.borderColor='rgba(212,80,80,0.6)';
    setTimeout(()=>document.getElementById('nameInput').style.borderColor='',1200);
    return; 
  }
  document.getElementById('nameDisplay').textContent = name;
  showPage('page2');
}

document.getElementById('nameInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') revealInvite();
});

// ── Response + EmailJS notification ──
function respond(answer){
  const name = document.getElementById('nameDisplay').textContent;
  document.getElementById('sendingMsg').classList.remove('hidden');

  // EmailJS — send notification to you
  const serviceId  = 'service_aoovuwh';
  const templateId = 'template_02hb0po';
  const publicKey  = 'mQeYobOZQt2ecWehZ';

  const templateParams = {
    from_name: name,
    reply: answer === 'yes' ? '✅ YES — She is coming!' : '❌ NO — She cannot make it.',
    message: `${name} responded ${answer.toUpperCase()} to your date invite on 27th July 2026 at Tim Hortons, Manchester.`,
    title: `Date Invite Response from ${name}`,
    name: name,
    time: new Date().toLocaleString(),
    email: 'noreply@dateinvite.com',
  };

  // Load EmailJS and send
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  script.onload = () => {
    emailjs.init(publicKey);
    emailjs.send(serviceId, templateId, templateParams)
      .then(r => console.log('Email sent:', r.status))
      .catch(e => console.log('Email error:', e.text));
  };
  document.head.appendChild(script);

  // Show response screen immediately (don't wait for email)
  setTimeout(()=>{
    if(answer === 'yes'){
      document.getElementById('responseIcon').textContent = '🥂';
      document.getElementById('responseTitle').innerHTML = `<em>See you there,</em><br>${name}!`;
      document.getElementById('responseMsg').textContent = 'Your response has been noted. Can\'t wait to see you on the 27th. It\'s going to be a beautiful afternoon. 💛';
    } else {
      document.getElementById('responseIcon').textContent = '🌹';
      document.getElementById('responseTitle').innerHTML = `<em>That\'s okay,</em><br>${name}`;
      document.getElementById('responseMsg').textContent = 'Thank you for letting me know. I hope we find another time soon. You\'ll be missed. 💛';
    }
    showPage('page3');
  }, 800);
}
</script>
</body>
</html>
